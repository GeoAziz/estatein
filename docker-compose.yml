services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: estatein-postgres
    environment:
      POSTGRES_USER: estate_dev
      POSTGRES_PASSWORD: local_password
      POSTGRES_DB: estate_dev
      TZ: Africa/Nairobi
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estate_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - estatein

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: estatein-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - estatein

  # Elasticsearch (for advanced search)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.5.0
    container_name: estatein-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - estatein

  # Prometheus (for metrics)
  prometheus:
    image: prom/prometheus:latest
    container_name: estatein-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - estatein

  # Grafana (for visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: estatein-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - estatein

  # Mail Server (for testing email)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: estatein-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - estatein

  # Backend API
  backend:
    build:
      context: ./estate-backend
      dockerfile: Dockerfile
    container_name: estatein-backend
    env_file:
      - ./estate-backend/.env
    environment:
      # Override host-oriented values from .env with in-network hostnames
      DATABASE_URL: "postgresql://estate_dev:local_password@postgres:5432/estate_dev"
      REDIS_URL: "redis://redis:6379"
      ELASTICSEARCH_URL: "http://elasticsearch:9200"
      SMTP_HOST: "mailhog"
      # This machine already runs a LocalStack instance on the host (outside this
      # compose project); reuse it via the host gateway rather than running a second one.
      AWS_ENDPOINT: "http://host.docker.internal:4566"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - estatein

  # Frontend (static production build, served by its own nginx)
  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: estatein-frontend
    depends_on:
      - backend
    networks:
      - estatein

  # Reverse proxy — single public entrypoint, this is the only port ngrok needs to forward to
  nginx:
    image: nginx:alpine
    container_name: estatein-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - estatein

networks:
  estatein:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  prometheus_data:
  grafana_data:
