version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: estatein-postgres
    environment:
      POSTGRES_USER: estate_dev
      POSTGRES_PASSWORD: local_password
      POSTGRES_DB: estate_dev
      POSTGRES_INITDB_ARGS: "-c timezone=Africa/Nairobi"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estate_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - estatein

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: estatein-redis
    command: redis-server --appendonly yes --requirepass redis_password
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - estatein

  # LocalStack (AWS mock services)
  localstack:
    image: localstack/localstack:latest
    container_name: estatein-localstack
    environment:
      SERVICES: s3,sqs,sns
      DEBUG: 1
      DATA_DIR: /tmp/localstack/data
      DOCKER_HOST: unix:///var/run/docker.sock
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
    volumes:
      - "${TMPDIR:-.}/.localstack:/tmp/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    ports:
      - "4566:4566"
      - "4571:4571"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - estatein

  # Elasticsearch (for advanced search)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.5.0
    container_name: estatein-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - estatein

  # Prometheus (for metrics)
  prometheus:
    image: prom/prometheus:latest
    container_name: estatein-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - estatein

  # Grafana (for visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: estatein-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - estatein

  # Mail Server (for testing email)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: estatein-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - estatein

  # Backend API
  backend:
    build:
      context: ./estate-backend
      dockerfile: Dockerfile
    container_name: estatein-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: "postgresql://estate_dev:local_password@postgres:5432/estate_dev"
      REDIS_URL: "redis://:redis_password@redis:6379"
      AWS_ENDPOINT: "http://localstack:4566"
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      S3_BUCKET: estatein-images
      ELASTICSEARCH_URL: "http://elasticsearch:9200"
      JWT_SECRET: dev-secret-change-in-production
      FRONTEND_URL: http://localhost:5173
    volumes:
      - ./estate-backend/src:/app/src
      - ./estate-backend/prisma:/app/prisma
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
    networks:
      - estatein
    command: npm run dev

  # Frontend (React + Vite)
  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: estatein-frontend
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./app/src:/app/src
    depends_on:
      - backend
    networks:
      - estatein
    command: npm run dev

networks:
  estatein:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  prometheus_data:
  grafana_data:
